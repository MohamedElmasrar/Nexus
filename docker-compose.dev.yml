# ─────────────────────────────────────────────────────────────
# Nexus — Development Docker Compose
# ─────────────────────────────────────────────────────────────
#
#   This file is optimized for fast local development.
#   It uses volume mounts and hot-reloading for the frontend
#   and backend, so you don't have to rebuild images on every change.
#
#   Start everything:
#     docker-compose -f docker-compose.dev.yml up --build
#
# ─────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL (Nexus DB) ────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nexus-db
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5433:5432"
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nexus -d nexus" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ownCloud 10 ───────────────────────────────────────────
  owncloud:
    image: owncloud/server:10.15
    container_name: nexus-owncloud
    ports:
      - "8080:8080"
    environment:
      OWNCLOUD_DOMAIN: localhost:8080
      OWNCLOUD_TRUSTED_DOMAINS: localhost,owncloud
      OWNCLOUD_DB_TYPE: mysql
      OWNCLOUD_DB_NAME: owncloud
      OWNCLOUD_DB_USERNAME: owncloud
      OWNCLOUD_DB_PASSWORD: owncloud
      OWNCLOUD_DB_HOST: owncloud-db
      OWNCLOUD_ADMIN_USERNAME: admin
      OWNCLOUD_ADMIN_PASSWORD: admin
      OWNCLOUD_REDIS_ENABLED: "true"
      OWNCLOUD_REDIS_HOST: owncloud-redis
    depends_on:
      owncloud-db:
        condition: service_healthy
      owncloud-redis:
        condition: service_started
    volumes:
      - owncloud-data:/mnt/data
    healthcheck:
      test: [ "CMD", "/usr/bin/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── MariaDB (ownCloud DB) ─────────────────────────────────
  owncloud-db:
    image: mariadb:10.11
    container_name: nexus-owncloud-db
    environment:
      MYSQL_ROOT_PASSWORD: owncloud
      MYSQL_DATABASE: owncloud
      MYSQL_USER: owncloud
      MYSQL_PASSWORD: owncloud
    volumes:
      - owncloud-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-u", "root", "--password=owncloud" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (ownCloud cache) ────────────────────────────────
  owncloud-redis:
    image: redis:7-alpine
    container_name: nexus-owncloud-redis
    volumes:
      - owncloud-redis-data:/data
    restart: unless-stopped

  # ── FastAPI Backend (Hot Reload) ──────────────────────────
  api:
    build:
      context: ./nexus_backend
      dockerfile: Dockerfile
    container_name: nexus-api
    # Override command to enable hot reload
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://nexus:nexus@db:5432/nexus
      SECRET_KEY: dev-secret-key-do-not-use-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      FIRST_ADMIN_USERNAME: admin
      FIRST_ADMIN_PASSWORD: admin
      FIRST_ADMIN_EMAIL: admin@nexus.local
      OWNCLOUD_URL: http://owncloud:8080
      OWNCLOUD_USERNAME: admin
      OWNCLOUD_PASSWORD: admin
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000,http://localhost:3001
      MAX_UPLOAD_SIZE_MB: "100"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: gemini-2.5-flash
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      # Mount source code for hot reload
      - ./nexus_backend:/app
      - chroma-data:/app/chroma_data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Frontend (Hot Reload) ─────────────────────────
  frontend:
    build:
      context: ./nexus
      dockerfile: Dockerfile
      # Only build up to the 'deps' stage (no production build)
      target: deps
    container_name: nexus-frontend
    # Override command to run the dev server
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Prevent Next.js from complaining about dev bindings
      WATCHPACK_POLLING: "true"
    volumes:
      # Mount source code for hot reload
      - ./nexus:/app
      # Anonymous volume to protect the node_modules installed in the 'deps' stage
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    restart: unless-stopped

volumes:
  nexus-db-data:
  chroma-data:
  owncloud-data:
  owncloud-db-data:
  owncloud-redis-data:
