name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexus/package-lock.json

      - name: Install frontend dependencies
        working-directory: nexus
        run: npm ci

      - name: Lint frontend
        working-directory: nexus
        run: npm run lint

  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nexus_backend/requirements.txt

      - name: Install backend dependencies
        working-directory: nexus_backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: nexus_backend
        run: pytest tests/ -v
