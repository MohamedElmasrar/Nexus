name: Build and Deploy to DigitalOcean

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: nexusregistry
  FRONTEND_IMAGE: nexus-frontend
  BACKEND_IMAGE: nexus-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./nexus_backend
          file: ./nexus_backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./nexus
          file: ./nexus/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_NAME: ${{ env.REGISTRY_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          REPO_URL: git@github.com:MohamedElmasrar/Nexus.git
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: REGISTRY,REGISTRY_NAME,IMAGE_TAG,DIGITALOCEAN_ACCESS_TOKEN,REPO_URL
          script: |
            set -e
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            if [ ! -d /opt/nexus/.git ]; then
              sudo mkdir -p /opt/nexus
              sudo chown -R $USER:$USER /opt/nexus
              git clone $REPO_URL /opt/nexus
            fi

            cd /opt/nexus
            git fetch origin
            git checkout main
            git reset --hard origin/main

            echo "$DIGITALOCEAN_ACCESS_TOKEN" | docker login $REGISTRY -u oauth2 --password-stdin

            export IMAGE_TAG=$IMAGE_TAG
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
