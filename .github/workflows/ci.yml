name: Tests & Code Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-tests:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexus/package-lock.json

      - name: Install frontend dependencies
        working-directory: nexus
        run: npm ci

      - name: Lint frontend
        working-directory: nexus
        run: npm run lint

      - name: Build frontend
        working-directory: nexus
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  backend-tests:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nexus_backend/requirements.txt

      - name: Install backend dependencies
        working-directory: nexus_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run backend tests with coverage
        working-directory: nexus_backend
        run: pytest tests/ -v --cov=app --cov-report=xml

      # Upload coverage report artifact for SonarQube scan job
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: nexus_backend/coverage.xml

  sonarqube:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disable shallow clone for better SonarQube attribution

      # Download the coverage report from the tests job
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: nexus_backend

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
